services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: household
      POSTGRES_PASSWORD: household
      POSTGRES_DB: household_finance
    volumes:
      - household_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U household -d household_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    env_file:
      - apps/web/.env
    environment:
      N8N_HOST: ${N8N_HOST:-127.0.0.1}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      # Browser + Google OAuth — 127.0.0.1 on Windows (localhost fails)
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://127.0.0.1:5678/}
      # Telegram webhooks only — set N8N_WEBHOOK_URL in root .env to ngrok HTTPS
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://127.0.0.1:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-dev-n8n-key-change-me}
      APP_API_BASE_URL: ${APP_API_BASE_URL:-https://household-financial-web.vercel.app}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  langgraph:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8081"
    ports:
      - "8081:8081"
    volumes:
      - ./services/langgraph-orchestrator:/app
    environment:
      PYTHONUNBUFFERED: "1"
      APP_WEB_BASE_URL: "http://host.docker.internal:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  household_pg_data:
  n8n_data:
