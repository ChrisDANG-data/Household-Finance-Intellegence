name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & build
    runs-on: ubuntu-latest

    env:
      # Prisma generate + Next.js build; no live DB required for unit tests
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      NODE_ENV: test
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Production build
        run: npm run build
